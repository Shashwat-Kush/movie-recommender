# Model training configuration for Matrix Factorization and Two-Tower

# Matrix Factorization
embedding_dim: 128
use_bias: true
sparse_embeddings: false

# Two-Tower specific
two_tower:
  hidden_dim: 256
  output_dim: 128
  dropout: 0.1
  metadata_dim: 128
  temperature: 0.05   # divides cosine scores into logit range for in-batch softmax
  min_rating: 3.5     # ratings below this are not treated as positives
  history_k: 20       # two_tower_history: pool the user's K most recent liked movies
  logq_correction: true  # debias in-batch negatives so raw cosine ranks by likelihood
                         # (makes the serving-time popularity blend unnecessary)

# Training hyperparameters
# Exponents need the 1.0e-5 form: YAML 1.1 reads 1e-5 as a string, not a float.
# 2048 OOMs on 8GB MPS with the in-batch softmax loss (B x B logits + backward temps)
batch_size: 1024
accum_steps: 4
lr: 0.001
weight_decay: 1.0e-5
max_epochs: 30
grad_clip: 1.0

# LR Scheduler
lr_scheduler:
  type: "reduce_on_plateau"
  patience: 3
  factor: 0.5
  min_lr: 1.0e-6

# Early stopping
early_stopping:
  patience: 5
  min_delta: 1.0e-4

# MPS memory management
use_fp16: true

# Checkpointing
checkpoint_dir: "checkpoints/two_tower"

# Data
num_workers: 0
pin_memory: false

# Logging
log_interval: 500